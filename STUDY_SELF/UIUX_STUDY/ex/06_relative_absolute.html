<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .parent {
        position: relative;
        border: 2px solid black;
        width: 400px;
        height: 300px;
      }

      .child {
        position: absolute;
        width: 100px;
        height: 100px;
        border-radius: 100px;
      }
    </style>
  </head>
  <body>
    <h1>절대 위치를 사용한 요소 배치</h1>
    <div class="parent">
      <div
        class="child"
        style="background-color: red; top: 10px; left: 10px"
      ></div>
      <div
        class="child"
        style="background-color: green; top: 10px; left: 290px"
      ></div>
      <div
        class="child"
        style="background-color: yellow; top: 190px; left: 10px"
      ></div>
      <div
        class="child"
        style="background-color: blue; top: 190px; left: 290px"
      ></div>
    </div>
    <h1>안녕하세요?</h1>
  </body>
</html>
