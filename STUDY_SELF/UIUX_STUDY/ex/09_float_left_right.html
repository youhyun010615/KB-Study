<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <style>
    .box {
      width: 100px;
      height: 100px;
      background-color: red;
    }

    .left {
      float: left;
    }
    .right {
      float: right;
    }

    .text {
      border: 1px solid black;
      clear: both;
    }
  </style>
  <body>
    <div class="box left"></div>
    <div class="box right"></div>

    <p class="text">
      그림처럼 p 태그 안에 있는 텍스트를 빨간 box 아래에 위치하도록
      만들어보세요.
    </p>
  </body>
</html>
