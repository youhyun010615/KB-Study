<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <style>
    .container {
      border: 1px solid black;
      width: 600px;
      height: 300px;
      display: flex;
      flex-direction: row;
      align-items: center;
    }
    .item {
      padding: 5px 45px;
      margin: 5px;
    }
    .item1 {
      background: red;
      height: 100px;
    }
    .item2 {
      background: orange;
      height: 150px;
    }
    .item3 {
      background: yellow;
      height: 100px;
    }
    .item4 {
      background: green;
      height: 50px;
    }
    .item5 {
      background: blue;
      height: 100px;
    }
  </style>
  <body>
    <div class="container">
      <div class="item item1"><p>1</p></div>
      <div class="item item2"><p>2</p></div>
      <div class="item item3"><p>3</p></div>
      <div class="item item4"><p>4</p></div>
      <div class="item item5"><p>5</p></div>
    </div>
  </body>
</html>
