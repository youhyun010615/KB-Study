<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <style>
    .box {
      width: 100px;
      height: 100px;
      background: red;
      float: left;
    }

    .text {
      border: 1px solid black;
      clear: left;
    }
  </style>
  <body>
    <div class="box"></div>
    <p class="text">
      float는 요소를 한쪽으로 이동시키고, 텍스트가 그 주변을 감싸며 배치되도록
      만드는 속성입니다.
    </p>
  </body>
</html>
