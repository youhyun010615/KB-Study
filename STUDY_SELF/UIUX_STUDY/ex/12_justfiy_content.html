<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .container {
        border: 1px solid black;
        display: flex;
        flex-direction: row;
        justify-content: space-between;
      }

      .item {
        padding: 5px 45px;
        margin: 5px;
        width: 50px;
      }
      .item1 {
        background: red;
      }
      .item2 {
        background: orange;
      }
      .item3 {
        background: yellow;
      }
      .item4 {
        background: green;
      }
      .item5 {
        background: blue;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="item item1"><p>1</p></div>
      <div class="item item2"><p>2</p></div>
      <div class="item item3"><p>3</p></div>
      <div class="item item4"><p>4</p></div>
      <div class="item item5"><p>5</p></div>
    </div>
  </body>
</html>
