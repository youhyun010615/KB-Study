<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .box {
        width: 50px;
        height: 50px;
        background: red;
        position: relative;
        text-align: center;
        color: white;
        border: 2px solid black;
        display: inline-block;
        top: 20px;
        left: 20px;
      }

      .box:hover {
        position: relative;
        left: 0px;
        top: 40px;
        background-color: saddlebrown;
      }
    </style>
  </head>
  <body>
    <div class="box">T</div>
    <div class="box">h</div>
    <div class="box">a</div>
    <div class="box">n</div>
    <div class="box">k</div>
    <div class="box">s</div>
  </body>
</html>
