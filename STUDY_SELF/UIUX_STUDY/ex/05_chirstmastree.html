<!doctype html>
<!-- 부모: relative 자식: absolute -->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .tree-container {
        position: relative;
        background-image: url('christmastree.png');
        width: 300px;
        height: 400px;
        background-size: contain;
        background-repeat: no-repeat;
      }

      .char {
        position: absolute;
        background-color: yellow;
        font-weight: bold;
        font-size: 25px;
      }
      .m {
        top: 100px;
        left: 70px;
      }
      .e {
        top: 20px;
        left: 150px;
      }
      .r_1 {
        top: 160px;
        left: 150px;
      }
      .r_2 {
        top: 220px;
        left: 230px;
      }
      .y {
        top: 250px;
        left: 60px;
      }
    </style>
  </head>
  <body>
    <div class="tree-container">
      <div class="char m">M</div>
      <div class="char e">E</div>
      <div class="char r_1">R</div>
      <div class="char r_2">R</div>
      <div class="char y">Y</div>
    </div>
  </body>
</html>
