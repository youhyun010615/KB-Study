<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>Flexbox 쇼핑몰 상품 리스트 실습</title>
    <link rel="stylesheet" href="shopping.css" />
  </head>
  <body>
    <h1>New Arrivals</h1>

    <div class="product-container">
      <div class="product-card">
        <div class="product-image">👟</div>
        <div class="product-info">
          <span class="product-category">신발 / 스니커즈</span>
          <p class="product-name">에어 맥스</p>
          <p class="product-price">129,000원</p>
          <button class="buy-btn">담기</button>
        </div>
      </div>

      <div class="product-card">
        <div class="product-image">⌚</div>
        <div class="product-info">
          <span class="product-category">악세서리</span>
          <p class="product-name">스마트 워치</p>
          <p class="product-price">350,000원</p>
          <button class="buy-btn">담기</button>
        </div>
      </div>

      <div class="product-card">
        <div class="product-image">🎧</div>
        <div class="product-info">
          <span class="product-category">디지털 / 가전</span>
          <p class="product-name">노이즈 캔슬링 헤드셋</p>
          <p class="product-price">280,000원</p>
          <button class="buy-btn">담기</button>
        </div>
      </div>

      <div class="product-card">
        <div class="product-image">🎒</div>
        <div class="product-info">
          <span class="product-category">가방 / 백팩</span>
          <p class="product-name">어반 스타일 백팩</p>
          <p class="product-price">85,000원</p>
          <button class="buy-btn">담기</button>
        </div>
      </div>
    </div>
  </body>
</html>
