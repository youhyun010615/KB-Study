<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pure CSS Login</title>

    <style>
      /* 전체 배경 */
      body {
        margin: 0;
        background-color: #f8f9fa;
        font-family: Arial, sans-serif;
      }

      /* 화면 중앙 정렬 */
      .container {
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      /* 카드 박스 */
      .card {
        width: 100%;
        max-width: 400px;
        background-color: white;
        padding: 24px;
        border-radius: 8px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      }

      /* 제목 */
      .title {
        text-align: center;
        margin-bottom: 24px;
        font-size: 24px;
        font-weight: bold;
      }

      /* 입력 영역 */
      .form-group {
        margin-bottom: 16px;
      }

      .form-label {
        display: block;
        margin-bottom: 6px;
        font-size: 14px;
      }

      .form-control {
        width: 100%;
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 4px;
        box-sizing: border-box;
      }

      /* 버튼 */
      .btn {
        width: 100%;
        padding: 10px;
        background-color: #0d6efd;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 16px;
      }

      .btn:hover {
        background-color: #0b5ed7;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="card">
        <h2 class="title">로그인</h2>
        <div class="form-group">
          <label for="email" class="form-label">이메일</label>
          <input
            type="email"
            id="email"
            class="form-control"
            placeholder="이메일을 입력하세요"
          />
        </div>
        <div class="form-group">
          <label for="password" class="form-label">비밀번호</label>
          <input
            type="password"
            id="password"
            class="form-control"
            placeholder="비밀번호를 입력하세요"
          />
        </div>
        <button class="btn">로그인</button>
      </div>
    </div>
  </body>
</html>
