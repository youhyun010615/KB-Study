<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>repeat와 minmax 실습</title>
    <link rel="stylesheet" href="grid.css" />
  </head>
  <body>
    <div class="container">
      <div class="card">
        <h3>상품 1</h3>
        <p>이 상품은 간단한 설명이 들어갑니다.</p>
        <button>구매하기</button>
      </div>

      <div class="card">
        <h3>상품 2</h3>
        <p>이 상품은 조금 더 긴 설명이 들어갈 수도 있습니다.</p>
        <button>구매하기</button>
      </div>

      <div class="card">
        <h3>상품 3</h3>
        <p>이 상품은 제일 인기가 많은 상품입니다.</p>
        <button>구매하기</button>
      </div>

      <div class="card">
        <h3>상품 4</h3>
        <p>이 상품은 다양한 특징을 가지고 있습니다.</p>
        <button>구매하기</button>
      </div>

      <div class="card">
        <h3>상품 5</h3>
        <p>이 상품은 가성비가 뛰어난 제품입니다.</p>
        <button>구매하기</button>
      </div>

      <div class="card">
        <h3>상품 6</h3>
        <p>이 상품은 최근에 출시된 신제품입니다.</p>
        <button>구매하기</button>
      </div>

      <div class="card">
        <h3>상품 7</h3>
        <p>이 상품은 리뷰 평점이 매우 높은 상품입니다.</p>
        <button>구매하기</button>
      </div>

      <div class="card">
        <h3>상품 8</h3>
        <p>이 상품은 한정 수량으로 판매되고 있습니다.</p>
        <button>구매하기</button>
      </div>
    </div>
  </body>
</html>
