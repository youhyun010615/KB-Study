<!doctype html>
<html lang="en">
  <head>
    <title>Document</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  </head>
  <body>
    <div id="app">
      <h1 :style="{...backgroundColor, ...fontStyle}">
        여러 스타일 적용하기 by 객체
      </h1>
      <h1 :style="[backgroundColor, fontStyle]">
        여러 스타일 적용하기 by 배열
      </h1>
    </div>
    <script>
      Vue.createApp({
        name: 'App',
        data() {
          return {
            backgroundColor: { backgroundColor: 'dodgerblue' },
            fontStyle: { color: 'red' },
          };
        },
      }).mount('#app');
    </script>
  </body>
</html>
